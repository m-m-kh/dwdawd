services:
  main:
    build:
      context: .
    image:
      drivefile
    volumes:
      - ./:/app
    depends_on:
      - mongo
    env_file:
      - .env
    restart: always
    command : ["python","main.py"]

  auth:
    build:
      context: .
    image:
      drivefile
    volumes:
      - ./:/app
    ports:
      - 8080:8080
    env_file:
      - .env
    restart: always
    command : ["python","auth.py"]

  mongo:
    image:
      mongo
    volumes:
      - ./config/db:/data/db
    ports:
      - 27017:27017
    env_file:
      - .env
    restart: always


  mongo-express:
    image:
      mongo-express
    ports:
      - 8081:8081
    env_file:
      - .env
    restart: always

  redis:
    image: redis:7-alpine
    container_name: redis-server
    ports:
      - "6379:6379"
    restart: always
    command: ["redis-server", "--appendonly", "yes"]



